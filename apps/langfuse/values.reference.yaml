# Langfuse Helm values reference — k3d / AWS switch
# Actual values are inlined in infra/live/003_argocd_config/terragrunt.hcl

langfuse:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  postgresql:
    enabled: true
    primary:
      persistence:
        size: 2Gi
  nextauth:
    secret: aipaas-langfuse-dev-secret-change-me
  salt:
    secret: aipaas-langfuse-dev-salt-change-me
service:
  type: ClusterIP
  port: 80
