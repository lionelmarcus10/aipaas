# OpenCost Helm values reference — k3d / AWS switch
# Actual values are inlined in infra/live/003_argocd_config/terragrunt.hcl

opencost:
  exporter:
    defaultClusterName: aipaas-k3d
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
  cloudProvider: ""
  prometheus:
    enabled: true
    internal:
      enabled: true
      address: http://prometheus-server.observability.svc.cluster.local:80
  ui:
    enabled: true
