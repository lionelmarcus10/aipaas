# vLLM Helm values — k3d CPU (default) / AWS GPU switch
# Upstream chart: vllm-project/vllm-helm
#
# Switch to AWS GPU: override these values in a separate values file or via Terragrunt:
#   image.repository: vllm/vllm-openai
#   image.tag: latest-gpu
#   resources: { nvidia.com/gpu: 1 }
#   extraInit.modelDownload.enabled: true (S3)

# --- k3d CPU mode (default) ---
image:
  repository: vllm/vllm-openai
  tag: latest
  command:
    - vllm
    - serve
    - facebook/opt-125m
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    - --device
    - cpu

replicaCount: 1

resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 1
    memory: 2Gi

containerPort: 8000
servicePort: 80
serviceName: vllm

# Disable S3 model download in k3d mode (model pulled from HF Hub directly)
extraInit:
  modelDownload:
    enabled: false
  pvcStorage: 1Gi

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

# KEDA ScaledObject will be added in Sprint 4 (Scale-to-Zero)
# autoscaling:
#   enabled: false  # managed by KEDA, not HPA

labels:
  environment: dev
