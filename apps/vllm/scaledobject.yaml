# KEDA ScaledObject for vLLM — Scale-to-Zero
# Activated in Sprint 4 when SQS queue is configured
# For now, scales to 1 when traffic arrives, 0 when idle

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vllm
  namespace: aipaas
  labels:
    deploymentName: vllm
spec:
  scaleTargetRef:
    name: vllm
  minReplicaCount: 0
  maxReplicaCount: 3
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    # Placeholder: HTTP trigger via prometheus scaler
    # Will be replaced by SQS trigger in Sprint 4
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.observability.svc.cluster.local:80
        metricName: vllm_requests
        threshold: "5"
        query: rate(vllm:request_total[1m])
