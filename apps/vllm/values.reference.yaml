# vLLM Helm values reference — k3d CPU (default) / AWS GPU switch
# The actual deployment uses raw manifests (deployment.yaml) for k3d.
# For AWS GPU mode, switch to the upstream Helm chart or update raw manifests:
#   image: vllm/vllm-openai:latest-gpu
#   resources: { nvidia.com/gpu: 1 }
#   extraInit.modelDownload.enabled: true (S3)

image:
  repository: vllm/vllm-openai
  tag: latest
  command:
    - vllm
    - serve
    - facebook/opt-125m
    - --host
    - 0.0.0.0
    - --port
    - "8000"
    - --device
    - cpu

replicaCount: 1
resources:
  limits:
    cpu: 2
    memory: 4Gi
  requests:
    cpu: 1
    memory: 2Gi

containerPort: 8000
servicePort: 80
serviceName: vllm

extraInit:
  modelDownload:
    enabled: false
  pvcStorage: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

labels:
  environment: dev
